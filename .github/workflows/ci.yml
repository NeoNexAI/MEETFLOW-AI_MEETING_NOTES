name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend: type check + lint + unit tests ─────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Unit tests + coverage gate
        run: pnpm test:coverage

      # Catch static-export regressions (e.g. dynamic routes missing
      # generateStaticParams) that only surface in the Tauri production build.
      - name: Production export build
        run: pnpm build
        env:
          NODE_ENV: production

  # ─── Rust: check + clippy + tests ────────────────────────────────────────
  rust:
    name: Rust (Tauri backend)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend/src-tauri

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - name: Create dist placeholder (required by tauri::generate_context!)
        run: New-Item -ItemType Directory -Force -Path dist
        working-directory: ${{ github.workspace }}

      - name: cargo check
        run: cargo check --all-features

      - name: cargo clippy
        run: cargo clippy --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-features

  # ─── Supply-chain: dependency vulnerability audit ────────────────────────
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # JS dependencies (production only).
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: pnpm install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: pnpm audit (prod)
        working-directory: frontend
        run: pnpm audit --prod

      # Rust dependencies.
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        working-directory: frontend/src-tauri
        run: cargo audit
